<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - EARTH Insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin:0;
    font-family:Arial;
    background:#eef2f7;
    display:block;
    padding:40px 0;
  
}


.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  width: 300px;
  margin:auto;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #1e90ff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #0b3d91;
}

.error {
  color: red;
  font-size: 14px;
}
</style>
</head>

<body>


<button onclick="goHome()" style="position:absolute; top:20px; left:20px;">🏠 Home</button>

<div class="login-box">
  <h2>🔐 Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <hr>

  <h3>📝 Register</h3>

  <input type="text" id="newUser" placeholder="New Username">
  <input type="password" id="newPass" placeholder="New Password">

  <button onclick="register()">Register</button>

  <p id="regMsg" style="color:green;"></p>

  <p class="error" id="error"></p>
</div>

<script>
  function register() {
  let newUser = document.getElementById("newUser").value;
  let newPass = document.getElementById("newPass").value;

  if(newUser === "" || newPass === "") {
    document.getElementById("regMsg").innerText = "Fill all fields!";
    return;
  }

  // Save user in browser
  localStorage.setItem(newUser, newPass);

  document.getElementById("regMsg").innerText = "Registered successfully!";
}
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let storedPass = localStorage.getItem(user);

  if(storedPass === pass) {
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText = "Invalid credentials!";
  }
}
function goHome() {
  window.location.href = "index.html";
}
function goDashboard(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
